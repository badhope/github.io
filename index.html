<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊泽城 | AI时代的探索者</title>
    <meta name="description" content="大数据专业本科生，全栈开发者，活跃的开源贡献者">
    
    <!-- Google Fonts - 多种字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== 全局变量 - 两种主题 ========== */
        :root {
            /* 蓝白主题 - 优化后的色彩系统 */
            --bg-light: linear-gradient(135deg, #f0f7ff 0%, #e1f0ff 50%, #d0e8ff 100%);
            --text-light-primary: #0d47a1;
            --text-light-secondary: #1565c0;
            --accent-light: #0097a7;
            --accent-light-hover: #00acc1;
            --glow-light: rgba(0, 151, 167, 0.5);
            --card-light: rgba(255, 255, 255, 0.95);
            --shadow-light: rgba(13, 71, 161, 0.1);
            
            /* 黑色主题 - 优化后的色彩系统 */
            --bg-dark: #0d1117;
            --text-dark-primary: #e6edf3;
            --text-dark-secondary: #8b949e;
            --accent-dark: #58a6ff;
            --accent-dark-hover: #79c0ff;
            --glow-dark: rgba(88, 166, 255, 0.4);
            --card-dark: rgba(22, 27, 34, 0.95);
            --shadow-dark: rgba(88, 166, 255, 0.1);
            
            /* 当前主题 */
            --current-bg: var(--bg-light);
            --current-text: var(--text-light-primary);
            --current-text-sec: var(--text-light-secondary);
            --current-accent: var(--accent-light);
            --current-accent-hover: var(--accent-light-hover);
            --current-glow: var(--glow-light);
            --current-card: var(--card-light);
            --current-shadow: var(--shadow-light);
            
            /* 动画时间函数 */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            
            /* 安全区域 */
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        body.dark-mode {
            --current-bg: var(--bg-dark);
            --current-text: var(--text-dark-primary);
            --current-text-sec: var(--text-dark-secondary);
            --current-accent: var(--accent-dark);
            --current-accent-hover: var(--accent-dark-hover);
            --current-glow: var(--glow-dark);
            --current-card: var(--card-dark);
            --current-shadow: var(--shadow-dark);
        }
        
        /* ========== 页面加载动画 ========== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--current-bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s var(--ease-out-expo), visibility 0.6s;
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top-color: var(--current-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loader-spinner::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid transparent;
            border-top-color: var(--current-text);
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ========== 滚动进度条 ========== */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--current-accent), var(--current-accent-hover));
            z-index: 10001;
            transition: width 0.1s linear;
        }
        
        /* ========== 返回顶部按钮 ========== */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--current-card);
            border: 2px solid var(--current-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s var(--ease-smooth);
            z-index: 999;
            box-shadow: 0 4px 20px var(--current-shadow);
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .back-to-top:hover {
            background: var(--current-accent);
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--current-glow);
        }
        
        .back-to-top svg {
            width: 24px;
            height: 24px;
            stroke: var(--current-accent);
            transition: stroke 0.3s;
        }
        
        .back-to-top:hover svg {
            stroke: var(--bg-dark);
        }
        
        body.dark-mode .back-to-top:hover svg {
            stroke: #0d1117;
        }
        
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--current-bg);
            color: var(--current-text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.6s var(--ease-smooth), color 0.6s var(--ease-smooth);
            line-height: 1.6;
            letter-spacing: 0.02em;
        }
        
        /* 文本选中样式 */
        ::selection {
            background: var(--current-accent);
            color: #fff;
        }
        
        /* 焦点样式 - 无障碍优化 */
        :focus-visible {
            outline: 2px solid var(--current-accent);
            outline-offset: 3px;
        }
        
        /* 平滑滚动指示 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* ========== 流星雨背景（蓝白主题） ========== */
        #meteor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
        }
        
        body.dark-mode #meteor-container {
            display: none;
        }
        
        .meteor {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(0, 188, 212, 1));
            transform: rotate(-45deg);
            animation: meteorFall 1.5s linear infinite;
            filter: drop-shadow(0 0 6px #00bcd4);
        }
        
        @keyframes meteorFall {
            0% {
                transform: translateX(100vw) translateY(-100vh) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translateX(-100vw) translateY(100vh) rotate(-45deg);
                opacity: 0;
            }
        }
        
        /* ========== 星空背景（黑色主题） ========== */
        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: none;
        }
        
        body.dark-mode #star-container {
            display: block;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* 星云效果 */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: nebulaFloat 10s ease-in-out infinite;
        }
        
        @keyframes nebulaFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        
        /* ========== 隐藏式导航栏 ========== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--ease-smooth);
            background: transparent;
        }
        
        nav:hover, nav.scrolled {
            background: var(--current-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px var(--current-shadow);
        }
        
        body.dark-mode nav:hover, body.dark-mode nav.scrolled {
            box-shadow: 0 4px 30px var(--current-glow);
        }
        
        /* LOGO - 六芒星图标 */
        .nav-logo {
            width: 50px;
            height: 50px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s var(--ease-smooth);
        }
        
        .nav-logo:hover {
            transform: rotate(30deg) scale(1.1);
        }
        
        .nav-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px var(--current-glow));
            transition: filter 0.3s;
        }
        
        .nav-logo:hover svg {
            filter: drop-shadow(0 0 20px var(--current-glow));
        }
        
        /* 导航链接 */
        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        
        .nav-links li {
            position: relative;
        }
        
        .nav-links a {
            color: var(--current-text-sec);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s var(--ease-smooth);
            padding: 10px 18px;
            border-radius: 25px;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }
        
        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--current-accent);
            transition: all 0.3s var(--ease-smooth);
            transform: translateX(-50%);
        }
        
        .nav-links a:hover::before {
            width: 60%;
        }
        
        .nav-links a:hover {
            color: var(--current-accent);
            background: rgba(88, 166, 255, 0.08);
            transform: translateY(-2px);
        }
        
        .nav-links a.active {
            color: var(--current-accent);
            background: rgba(88, 166, 255, 0.12);
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            width: 64px;
            height: 32px;
            background: rgba(0, 151, 167, 0.15);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--current-accent);
            transition: all 0.4s var(--ease-smooth);
            overflow: hidden;
        }
        
        .theme-toggle:hover {
            background: rgba(0, 151, 167, 0.25);
            transform: scale(1.05);
        }
        
        body.dark-mode .theme-toggle {
            background: rgba(88, 166, 255, 0.15);
        }
        
        body.dark-mode .theme-toggle:hover {
            background: rgba(88, 166, 255, 0.25);
        }
        
        .theme-toggle::before {
            content: '🌙';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            transition: all 0.4s var(--ease-smooth);
            opacity: 1;
        }
        
        .theme-toggle::after {
            content: '☀️';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.4s var(--ease-smooth);
        }
        
        body.dark-mode .theme-toggle::before {
            opacity: 0.4;
        }
        
        body.dark-mode .theme-toggle::after {
            opacity: 1;
        }
        
        .theme-toggle-ball {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            border-radius: 50%;
            position: absolute;
            left: 3px;
            top: 3px;
            transition: all 0.4s var(--ease-bounce);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        
        body.dark-mode .theme-toggle-ball {
            left: calc(100% - 27px);
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            box-shadow: 0 2px 8px var(--current-glow);
        }
        
        /* 移动端菜单按钮 */
        .menu-toggle {
            display: none;
            background: transparent;
            border: 2px solid var(--current-accent);
            color: var(--current-accent);
            font-size: 20px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
            position: relative;
        }
        
        .menu-toggle:hover {
            background: var(--current-accent);
            color: #fff;
            transform: scale(1.05);
        }
        
        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: currentColor;
            margin: 4px auto;
            transition: all 0.3s var(--ease-smooth);
        }
        
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }
        
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }
        
        /* ========== 主要内容区 ========== */
        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }
        
        /* ========== 六芒星 LOGO ========== */
        .hexagram-container {
            width: 200px;
            height: 200px;
            position: relative;
            margin-bottom: 40px;
            animation: hexagramFloat 4s ease-in-out infinite;
        }
        
        @keyframes hexagramFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(180deg); }
        }
        
        .hexagram {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .hexagram svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px var(--current-glow));
            transition: filter 0.3s;
        }
        
        .hexagram:hover svg {
            filter: drop-shadow(0 0 50px var(--current-glow));
        }
        
        .hexagram-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, var(--current-glow) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.15); }
        }
        
        /* ========== 动态标题 ========== */
        .title-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--current-text-sec);
            margin-bottom: 20px;
            opacity: 0.85;
            text-transform: uppercase;
        }
        
        .typing-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            background: linear-gradient(90deg, var(--current-accent), var(--current-text), var(--current-accent));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite;
            min-height: 70px;
            position: relative;
        }
        
        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .cursor {
            display: inline-block;
            width: 3px;
            height: 50px;
            background: var(--current-accent);
            margin-left: 5px;
            animation: cursorBlink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }
        
        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 副标题 */
        .subtitle {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 18px;
            color: var(--current-text-sec);
            margin-top: 20px;
            font-weight: 400;
            opacity: 0.85;
            line-height: 1.8;
        }
        
        .subtitle span {
            color: var(--current-accent);
            font-weight: 700;
            position: relative;
        }
        
        .subtitle span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--current-accent);
            opacity: 0.5;
        }
        
        /* ========== 探索按钮 ========== */
        .explore-section {
            margin-top: 60px;
        }
        
        .explore-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 18px 45px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            color: var(--current-text);
            background: var(--current-card);
            border: 2px solid var(--current-accent);
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s var(--ease-smooth);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px var(--current-shadow);
        }
        
        .explore-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s var(--ease-smooth);
        }
        
        .explore-btn:hover::before {
            left: 100%;
        }
        
        .explore-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px var(--current-glow);
            background: var(--current-accent);
            color: #fff;
            border-color: var(--current-accent);
        }
        
        .explore-btn:active {
            transform: translateY(-2px) scale(0.98);
        }
        
        /* 按钮提示文字 */
        .btn-tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--current-card);
            color: var(--current-text);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s var(--ease-smooth);
            white-space: nowrap;
            border: 1px solid var(--current-accent);
            box-shadow: 0 4px 15px var(--current-shadow);
        }
        
        .explore-btn:hover .btn-tooltip {
            opacity: 1;
            bottom: -45px;
        }
        
        /* 按钮图标动画 */
        .btn-icon {
            font-size: 22px;
            transition: transform 0.3s var(--ease-smooth);
        }
        
        .explore-btn:hover .btn-icon {
            transform: translateX(5px) scale(1.1);
        }
        
        /* ========== 社交链接 ========== */
        .social-section {
            display: flex;
            gap: 15px;
            margin-top: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .social-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: transparent;
            border: 2px solid var(--current-accent);
            border-radius: 30px;
            color: var(--current-accent);
            text-decoration: none;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s var(--ease-smooth);
            cursor: pointer;
            overflow: hidden;
        }
        
        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--current-accent);
            transition: width 0.3s var(--ease-smooth);
            z-index: -1;
        }
        
        .social-btn:hover::before {
            width: 100%;
        }
        
        .social-btn:hover {
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--current-glow);
        }
        
        .social-btn svg {
            transition: transform 0.3s var(--ease-smooth);
        }
        
        .social-btn:hover svg {
            transform: scale(1.1);
        }
        
        /* 社交按钮提示 */
        .social-tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--current-card);
            color: var(--current-text);
            padding: 5px 14px;
            border-radius: 15px;
            font-size: 11px;
            opacity: 0;
            transition: all 0.3s var(--ease-smooth);
            white-space: nowrap;
            border: 1px solid rgba(88, 166, 255, 0.2);
            box-shadow: 0 4px 12px var(--current-shadow);
        }
        
        .social-btn:hover .social-tooltip {
            opacity: 1;
            bottom: -40px;
        }
        
        /* ========== 底部名言 ========== */
        .quote-section {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            width: calc(100% - 40px);
            max-width: 650px;
        }
        
        .quote-box {
            background: var(--current-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(88, 166, 255, 0.15);
            border-radius: 20px;
            padding: 20px 35px;
            box-shadow: 0 8px 32px var(--current-shadow);
            transition: all 0.4s var(--ease-smooth);
        }
        
        .quote-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px var(--current-glow);
            border-color: rgba(88, 166, 255, 0.3);
        }
        
        .quote-text {
            font-family: 'Noto Sans SC', sans-serif;
            font-style: italic;
            font-size: 15px;
            color: var(--current-text-sec);
            line-height: 1.7;
            margin-bottom: 8px;
        }
        
        .quote-author {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--current-accent);
            letter-spacing: 2px;
            opacity: 0.9;
        }
        
        /* ========== 装饰粒子 ========== */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--current-accent);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 10s infinite;
            opacity: 0.6;
        }
        
        @keyframes particleFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            50% {
                transform: translate(80px, -80px) scale(1.3);
                opacity: 0.8;
            }
        }
        
        /* ========== 滚动条美化 ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--current-accent);
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--current-accent-hover);
        }
        
        /* ========== 响应式设计 ========== */
        @media (max-width: 1024px) {
            nav {
                padding: 18px 40px;
            }
            
            .nav-links {
                gap: 6px;
            }
            
            .nav-links a {
                padding: 8px 14px;
                font-size: 13px;
            }
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--current-card);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 20px;
                gap: 10px;
                border-top: 1px solid rgba(88, 166, 255, 0.2);
                box-shadow: 0 10px 40px var(--current-shadow);
            }
            
            .nav-links.active {
                display: flex;
            }
            
            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px 20px;
            }
            
            .menu-toggle {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            
            .hexagram-container {
                width: 150px;
                height: 150px;
            }
            
            .typing-title {
                font-size: 28px;
                min-height: 50px;
            }
            
            .cursor {
                height: 35px;
            }
            
            .main-title {
                font-size: 16px;
            }
            
            .subtitle {
                font-size: 14px;
                padding: 0 20px;
            }
            
            .explore-btn {
                padding: 14px 35px;
                font-size: 15px;
            }
            
            .social-section {
                flex-direction: column;
                gap: 12px;
                width: 100%;
                max-width: 300px;
            }
            
            .social-btn {
                justify-content: center;
                width: 100%;
            }
            
            .quote-section {
                bottom: 20px;
                width: calc(100% - 30px);
            }
            
            .quote-box {
                padding: 15px 20px;
            }
            
            .quote-text {
                font-size: 13px;
            }
            
            .back-to-top {
                bottom: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
        }
        
        @media (max-width: 480px) {
            .typing-title {
                font-size: 22px;
            }
            
            .explore-btn {
                padding: 12px 28px;
                font-size: 14px;
            }
            
            .main-title {
                font-size: 14px;
                letter-spacing: 2px;
            }
        }
        
        /* ========== 打印样式 ========== */
        @media print {
            nav, .quote-section, .back-to-top, .scroll-progress, #meteor-container, #star-container, #particle-container {
                display: none !important;
            }
            
            body {
                background: #fff !important;
                color: #000 !important;
            }
        }
    </style>
</head>

    <main>

    <!-- 底部名言 -->
    <div class="quote-section">
        <div class="quote-box">
            <p class="quote-text" id="quoteText">"加载中..."</p>
            <p class="quote-author" id="quoteAuthor">— 加载中</p>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script>
        // ========== 0. 页面加载动画 ==========
        window.addEventListener('load', function() {
            const loader = document.getElementById('pageLoader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 500);
        });
        
        // ========== 1. 主题切换 ==========
        const themeToggle = document.getElementById('themeToggle');
        
        themeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        
        // 加载保存的主题
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        
        // ========== 2. 滚动进度条 ==========
        const scrollProgress = document.getElementById('scrollProgress');
        const backToTop = document.getElementById('backToTop');
        const navbar = document.querySelector('nav');
        
        function updateScrollProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            scrollProgress.style.width = scrollPercent + '%';
            
            // 返回顶部按钮显示/隐藏
            if (scrollTop > 300) {
                backToTop.classList.add('visible');
                navbar.classList.add('scrolled');
            } else {
                backToTop.classList.remove('visible');
                navbar.classList.remove('scrolled');
            }
        }
        
        window.addEventListener('scroll', updateScrollProgress);
        
        // 返回顶部功能
        backToTop.addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
        
        // ========== 3. 创建流星雨（蓝白主题） ==========
        function createMeteors() {
            const container = document.getElementById('meteor-container');
            const meteorCount = 15;
            
            for (let i = 0; i < meteorCount; i++) {
                setTimeout(() => {
                    createSingleMeteor(container);
                }, i * 300);
            }
        }
        
        function createSingleMeteor(container) {
            if (!container) return;
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = Math.random() * 100 + '%';
            meteor.style.top = Math.random() * 50 + '%';
            meteor.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
            container.appendChild(meteor);
            
            meteor.addEventListener('animationend', function() {
                meteor.remove();
                if (!document.hidden) {
                    createSingleMeteor(container);
                }
            });
        }
        
        // ========== 4. 创建星空（黑色主题） ==========
        function createStars() {
            const container = document.getElementById('star-container');
            if (!container) return;
            const starCount = 200;
            
            // 星云
            for (let i = 0; i < 3; i++) {
                const nebula = document.createElement('div');
                nebula.className = 'nebula';
                nebula.style.left = Math.random() * 80 + 10 + '%';
                nebula.style.top = Math.random() * 80 + 10 + '%';
                nebula.style.width = Math.random() * 200 + 100 + 'px';
                nebula.style.height = nebula.style.width;
                nebula.style.background = `radial-gradient(circle, rgba(88,166,255,0.08) 0%, transparent 70%)`;
                nebula.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(nebula);
            }
            
            // 星星
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2.5 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
                container.appendChild(star);
            }
        }
        
        // ========== 5. 创建装饰粒子 ==========
        function createParticles() {
            const container = document.getElementById('particle-container');
            if (!container) return;
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // ========== 6. 打字效果 ==========
        const phrases = [
            "AI 时代的探索者",
            "熊泽城",
            "积极的开源贡献者",
            "活跃的技术开发者",
            "大数据专业学生",
            "全栈开发爱好者",
            "未来技术追梦人",
            "创新思维实践者"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typedText = document.getElementById('typed-text');
        
        function typeEffect() {
            if (!typedText) return;
            const currentPhrase = phrases[phraseIndex];
            
            if (!isDeleting) {
                typedText.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                
                if (charIndex === currentPhrase.length) {
                    setTimeout(() => {
                        isDeleting = true;
                        typeEffect();
                    }, 2000);
                    return;
                }
            } else {
                typedText.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                }
            }
            
            setTimeout(typeEffect, isDeleting ? 50 : 100);
        }
        
        // ========== 7. 名言显示 ==========
        function fetchQuote() {
            const quotes = [
                { text: "未来的技术定会愈发先进，让我们一起见证这个时代。", author: "熊泽城" },
                { text: "Stay hungry, stay foolish. 求知若饥，虚心若愚。", author: "Steve Jobs" },
                { text: "任何足够先进的技术，初看都与魔法无异。", author: "Arthur C. Clarke" },
                { text: "代码是写给人看的，顺便给机器执行。", author: "Donald Knuth" },
                { text: "简单是可靠的先决条件。", author: "Dijkstra" },
                { text: "先让它工作，再让它快，再让它简单。", author: "Kent Beck" },
                { text: "最好的代码是没有代码。", author: "Jeff Atwood" },
                { text: "程序必须是为了给人看而写，给机器执行只是附带任务。", author: "Donald Knuth" }
            ];
            
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            
            if (quoteText && quoteAuthor) {
                quoteText.textContent = `"${randomQuote.text}"`;
                quoteAuthor.textContent = `— ${randomQuote.author}`;
            }
        }
        
        // ========== 8. 移动端菜单 ==========
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        
        menuToggle.addEventListener('click', function() {
            const isActive = navLinks.classList.toggle('active');
            menuToggle.classList.toggle('active');
            menuToggle.setAttribute('aria-expanded', isActive);
        });
        
        // 点击导航链接后关闭菜单
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.classList.remove('active');
                menuToggle.setAttribute('aria-expanded', 'false');
            });
        });
        
        // ========== 9. 键盘导航支持 ==========
        document.addEventListener('keydown', function(e) {
            // ESC 关闭移动端菜单
            if (e.key === 'Escape' && navLinks.classList.contains('active')) {
                navLinks.classList.remove('active');
                menuToggle.classList.remove('active');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        });
        
        // ========== 初始化 ==========
        window.addEventListener('load', function() {
            createMeteors();
            createStars();
            createParticles();
            typeEffect();
            fetchQuote();
            
            // 每30秒更新名言
            setInterval(fetchQuote, 30000);
        });
        
        // ========== 性能优化：页面可见性 ==========
        document.addEventListener('visibilitychange', function() {
            const containers = ['meteor-container', 'star-container', 'particle-container'];
            
            containers.forEach(id => {
                const container = document.getElementById(id);
                if (container) {
                    container.style.animationPlayState = document.hidden ? 'paused' : 'running';
                }
            });
        });
    </script>
</body>
