<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊泽城 | AI时代的探索者</title>
    <meta name="description" content="大数据专业本科生，全栈开发者，活跃的开源贡献者">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-light: linear-gradient(135deg, #ffffff 0%, #f0f8ff 50%, #e6f3ff 100%);
            --text-light-primary: #1a365d;
            --text-light-secondary: #2c5282;
            --accent-light: #0078d4;
            --accent-light-hover: #106ebe;
            --accent-light-soft: rgba(0, 120, 212, 0.15);
            --glow-light: rgba(0, 120, 212, 0.4);
            --card-light: rgba(255, 255, 255, 0.92);
            --shadow-light: rgba(0, 120, 212, 0.12);
            --border-light: rgba(0, 120, 212, 0.2);
            
            --bg-dark: #0d1117;
            --text-dark-primary: #e6edf3;
            --text-dark-secondary: #8b949e;
            --accent-dark: #58a6ff;
            --accent-dark-hover: #79c0ff;
            --accent-dark-soft: rgba(88, 166, 255, 0.15);
            --glow-dark: rgba(88, 166, 255, 0.35);
            --card-dark: rgba(22, 27, 34, 0.95);
            --shadow-dark: rgba(88, 166, 255, 0.1);
            --border-dark: rgba(88, 166, 255, 0.2);
            
            --current-bg: var(--bg-light);
            --current-text: var(--text-light-primary);
            --current-text-sec: var(--text-light-secondary);
            --current-accent: var(--accent-light);
            --current-accent-hover: var(--accent-light-hover);
            --current-accent-soft: var(--accent-light-soft);
            --current-glow: var(--glow-light);
            --current-card: var(--card-light);
            --current-shadow: var(--shadow-light);
            --current-border: var(--border-light);
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        body.dark-mode {
            --current-bg: var(--bg-dark);
            --current-text: var(--text-dark-primary);
            --current-text-sec: var(--text-dark-secondary);
            --current-accent: var(--accent-dark);
            --current-accent-hover: var(--accent-dark-hover);
            --current-accent-soft: var(--accent-dark-soft);
            --current-glow: var(--glow-dark);
            --current-card: var(--card-dark);
            --current-shadow: var(--shadow-dark);
            --current-border: var(--border-dark);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--current-bg);
            color: var(--current-text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s var(--ease-smooth), color 0.5s var(--ease-smooth);
            line-height: 1.7;
            letter-spacing: 0.02em;
        }
        
        ::selection {
            background: var(--current-accent);
            color: #fff;
        }
        
        :focus-visible {
            outline: 2px solid var(--current-accent);
            outline-offset: 3px;
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--current-bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s var(--ease-out-expo), visibility 0.6s;
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .loader-logo {
            width: 80px;
            height: 80px;
            animation: loaderPulse 1.5s ease-in-out infinite;
        }
        
        .loader-logo svg {
            width: 100%;
            height: 100%;
        }
        
        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--current-accent);
            letter-spacing: 3px;
        }
        
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--current-accent), var(--current-accent-hover));
            z-index: 10001;
            transition: width 0.1s linear;
        }
        
        #meteor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
            overflow: hidden;
        }
        
        body.dark-mode #meteor-container {
            display: none;
        }
        
        .meteor {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0, 120, 212, 0), rgba(0, 120, 212, 0.8));
            transform: rotate(-45deg);
            animation: meteorFall 2s linear infinite;
            filter: drop-shadow(0 0 4px var(--current-accent));
        }
        
        @keyframes meteorFall {
            0% {
                transform: translateX(100vw) translateY(-100vh) rotate(-45deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(-100vw) translateY(100vh) rotate(-45deg);
                opacity: 0;
            }
        }
        
        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: none;
            overflow: hidden;
        }
        
        body.dark-mode #star-container {
            display: block;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: nebulaFloat 15s ease-in-out infinite;
        }
        
        @keyframes nebulaFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(40px, -40px) scale(1.15); opacity: 0.7; }
        }
        
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--current-accent);
            border-radius: 50%;
            animation: particleFloat 12s ease-in-out infinite;
            opacity: 0.4;
        }
        
        @keyframes particleFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(60px, -60px) scale(1.2);
                opacity: 0.6;
            }
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--ease-smooth);
            background: transparent;
        }
        
        nav.scrolled {
            background: var(--current-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px var(--current-shadow);
            border-bottom: 1px solid var(--current-border);
        }
        
        .nav-logo {
            width: 46px;
            height: 46px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s var(--ease-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-logo:hover {
            transform: rotate(30deg) scale(1.1);
        }
        
        .nav-logo svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 8px var(--current-glow));
            transition: filter 0.3s;
        }
        
        .nav-logo:hover svg {
            filter: drop-shadow(0 0 15px var(--current-glow));
        }
        
        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
            align-items: center;
        }
        
        .nav-links a {
            color: var(--current-text-sec);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.3s var(--ease-smooth);
            padding: 10px 16px;
            border-radius: 22px;
            display: inline-block;
            position: relative;
        }
        
        .nav-links a:hover {
            color: var(--current-accent);
            background: var(--current-accent-soft);
            transform: translateY(-2px);
        }
        
        .nav-links a.active {
            color: #fff;
            background: var(--current-accent);
            font-weight: 600;
        }
        
        .theme-toggle {
            width: 60px;
            height: 30px;
            background: var(--current-accent-soft);
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--current-border);
            transition: all 0.4s var(--ease-smooth);
            margin-left: 10px;
        }
        
        .theme-toggle:hover {
            border-color: var(--current-accent);
            box-shadow: 0 0 15px var(--current-glow);
        }
        
        .theme-toggle-ball {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #fff 0%, #e8f4ff 100%);
            border-radius: 50%;
            position: absolute;
            left: 2px;
            top: 2px;
            transition: all 0.4s var(--ease-bounce);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        
        body.dark-mode .theme-toggle-ball {
            left: calc(100% - 24px);
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            box-shadow: 0 2px 8px var(--current-glow);
        }
        
        .theme-toggle-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            transition: opacity 0.3s;
        }
        
        .theme-toggle-icon.sun {
            right: 6px;
            opacity: 0.5;
        }
        
        .theme-toggle-icon.moon {
            left: 6px;
            opacity: 1;
        }
        
        body.dark-mode .theme-toggle-icon.sun {
            opacity: 1;
        }
        
        body.dark-mode .theme-toggle-icon.moon {
            opacity: 0.5;
        }
        
        .menu-toggle {
            display: none;
            background: transparent;
            border: 2px solid var(--current-border);
            color: var(--current-accent);
            width: 42px;
            height: 42px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .menu-toggle:hover {
            background: var(--current-accent);
            color: #fff;
            border-color: var(--current-accent);
        }
        
        .menu-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: currentColor;
            transition: all 0.3s var(--ease-smooth);
            border-radius: 1px;
        }
        
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }
        
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }
        
        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 180px;
        }
        
        .hexagram-container {
            width: 180px;
            height: 180px;
            position: relative;
            margin-bottom: 35px;
            animation: hexagramFloat 5s ease-in-out infinite;
        }
        
        @keyframes hexagramFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(180deg); }
        }
        
        .hexagram {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .hexagram svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 25px var(--current-glow));
            transition: filter 0.3s;
        }
        
        .hexagram:hover svg {
            filter: drop-shadow(0 0 40px var(--current-glow));
        }
        
        .hexagram-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, var(--current-glow) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--current-text-sec);
            margin-bottom: 18px;
            opacity: 0.8;
            text-transform: uppercase;
        }
        
        .typing-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(28px, 5.5vw, 52px);
            font-weight: 900;
            background: linear-gradient(135deg, var(--current-accent) 0%, var(--current-text) 50%, var(--current-accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .cursor {
            display: inline-block;
            width: 3px;
            height: 45px;
            background: var(--current-accent);
            margin-left: 4px;
            animation: cursorBlink 1s infinite;
            vertical-align: middle;
            border-radius: 2px;
        }
        
        @keyframes cursorBlink {
            0%, 45% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
        .subtitle {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 17px;
            color: var(--current-text-sec);
            margin-top: 18px;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.8;
        }
        
        .subtitle span {
            color: var(--current-accent);
            font-weight: 700;
            position: relative;
        }
        
        .subtitle span::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--current-accent);
            opacity: 0.4;
            border-radius: 1px;
        }
        
        .explore-section {
            margin-top: 50px;
        }
        
        .explore-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            color: var(--current-text);
            background: var(--current-card);
            border: 2px solid var(--current-accent);
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s var(--ease-smooth);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px var(--current-shadow);
        }
        
        .explore-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s var(--ease-smooth);
        }
        
        .explore-btn:hover::before {
            left: 100%;
        }
        
        .explore-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--current-glow);
            background: var(--current-accent);
            color: #fff;
            border-color: var(--current-accent);
        }
        
        .explore-btn:active {
            transform: translateY(-1px);
        }
        
        .btn-icon {
            font-size: 20px;
            transition: transform 0.3s var(--ease-smooth);
        }
        
        .explore-btn:hover .btn-icon {
            transform: translateX(4px) scale(1.1);
        }
        
        .social-section {
            display: flex;
            gap: 12px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .social-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid var(--current-border);
            border-radius: 28px;
            color: var(--current-text-sec);
            text-decoration: none;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            transition: all 0.3s var(--ease-smooth);
            cursor: pointer;
            overflow: hidden;
        }
        
        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--current-accent);
            transition: width 0.3s var(--ease-smooth);
            z-index: -1;
        }
        
        .social-btn:hover::before {
            width: 100%;
        }
        
        .social-btn:hover {
            color: #fff;
            border-color: var(--current-accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--current-glow);
        }
        
        .social-btn svg {
            transition: transform 0.3s var(--ease-smooth);
        }
        
        .social-btn:hover svg {
            transform: scale(1.1);
        }
        
        .quote-section {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            padding: 20px;
            background: linear-gradient(to top, var(--current-card) 0%, transparent 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s var(--ease-smooth);
            opacity: 1;
        }
        
        .quote-section.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        
        .quote-box {
            max-width: 600px;
            margin: 0 auto;
            background: var(--current-card);
            border: 1px solid var(--current-border);
            border-radius: 16px;
            padding: 16px 28px;
            box-shadow: 0 4px 20px var(--current-shadow);
            transition: all 0.3s var(--ease-smooth);
        }
        
        .quote-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--current-glow);
            border-color: var(--current-accent);
        }
        
        .quote-text {
            font-family: 'Noto Sans SC', sans-serif;
            font-style: italic;
            font-size: 14px;
            color: var(--current-text-sec);
            line-height: 1.6;
            margin-bottom: 6px;
        }
        
        .quote-author {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--current-accent);
            letter-spacing: 2px;
            opacity: 0.9;
        }
        
        .back-to-top {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 46px;
            height: 46px;
            background: var(--current-card);
            border: 2px solid var(--current-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: all 0.4s var(--ease-smooth);
            z-index: 998;
            box-shadow: 0 4px 15px var(--current-shadow);
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .back-to-top:hover {
            background: var(--current-accent);
            border-color: var(--current-accent);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--current-glow);
        }
        
        .back-to-top svg {
            width: 22px;
            height: 22px;
            stroke: var(--current-accent);
            transition: stroke 0.3s;
        }
        
        .back-to-top:hover svg {
            stroke: #fff;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--current-accent);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--current-accent-hover);
        }
        
        @media (max-width: 1024px) {
            nav {
                padding: 16px 30px;
            }
            
            .nav-links {
                gap: 4px;
            }
            
            .nav-links a {
                padding: 8px 14px;
                font-size: 13px;
            }
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 14px 18px;
            }
            
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--current-card);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 15px;
                gap: 8px;
                border-top: 1px solid var(--current-border);

    <div class="quote-section" id="quoteSection">
        <div class="quote-box">
            <p class="quote-text" id="quoteText">"加载中..."</p>
            <p class="quote-author" id="quoteAuthor">— 加载中</p>
        </div>
    </div>
    
    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('pageLoader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 400);
        });
        
        const themeToggle = document.getElementById('themeToggle');
        
        themeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        
        const scrollProgress = document.getElementById('scrollProgress');
        const backToTop = document.getElementById('backToTop');
        const navbar = document.getElementById('navbar');
        const quoteSection = document.getElementById('quoteSection');
        
        function updateScrollProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            scrollProgress.style.width = scrollPercent + '%';
            
            if (scrollTop > 200) {
                backToTop.classList.add('visible');
                navbar.classList.add('scrolled');
            } else {
                backToTop.classList.remove('visible');
                navbar.classList.remove('scrolled');
            }
            
            if (scrollTop > 50) {
                quoteSection.classList.add('hidden');
            } else {
                quoteSection.classList.remove('hidden');
            }
        }
        
        window.addEventListener('scroll', updateScrollProgress);
        
        backToTop.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        function createMeteors() {
            const container = document.getElementById('meteor-container');
            if (!container) return;
            const meteorCount = 12;
            
            for (let i = 0; i < meteorCount; i++) {
                setTimeout(() => createSingleMeteor(container), i * 400);
            }
        }
        
        function createSingleMeteor(container) {
            if (!container) return;
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = Math.random() * 100 + '%';
            meteor.style.top = Math.random() * 40 + '%';
            meteor.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
            container.appendChild(meteor);
            
            meteor.addEventListener('animationend', function() {
                meteor.remove();
                if (!document.hidden) {
                    createSingleMeteor(container);
                }
            });
        }
        
        function createStars() {
            const container = document.getElementById('star-container');
            if (!container) return;
            
            for (let i = 0; i < 3; i++) {
                const nebula = document.createElement('div');
                nebula.className = 'nebula';
                nebula.style.left = Math.random() * 70 + 15 + '%';
                nebula.style.top = Math.random() * 70 + 15 + '%';
                nebula.style.width = Math.random() * 180 + 80 + 'px';
                nebula.style.height = nebula.style.width;
                nebula.style.background = `radial-gradient(circle, rgba(88,166,255,0.06) 0%, transparent 70%)`;
                nebula.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(nebula);
            }
            
            for (let i = 0; i < 180; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
                container.appendChild(star);
            }
        }
        
        function createParticles() {
            const container = document.getElementById('particle-container');
            if (!container) return;
            
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 10) + 's';
                container.appendChild(particle);
            }
        }
        
        const phrases = [
            "AI 时代的探索者",
            "熊泽城",
            "积极的开源贡献者",
            "活跃的技术开发者",
            "大数据专业学生",
            "全栈开发爱好者",
            "未来技术追梦人",
            "创新思维实践者"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typedText = document.getElementById('typed-text');
        
        function typeEffect() {
            if (!typedText) return;
            const currentPhrase = phrases[phraseIndex];
            
            if (!isDeleting) {
                typedText.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                
                if (charIndex === currentPhrase.length) {
                    setTimeout(() => {
                        isDeleting = true;
                        typeEffect();
                    }, 2000);
                    return;
                }
            } else {
                typedText.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                }
            }
            
            setTimeout(typeEffect, isDeleting ? 40 : 100);
        }
        
        function fetchQuote() {
            const quotes = [
                { text: "未来的技术定会愈发先进，让我们一起见证这个时代。", author: "熊泽城" },
                { text: "Stay hungry, stay foolish. 求知若饥，虚心若愚。", author: "Steve Jobs" },
                { text: "任何足够先进的技术，初看都与魔法无异。", author: "Arthur C. Clarke" },
                { text: "代码是写给人看的，顺便给机器执行。", author: "Donald Knuth" },
                { text: "简单是可靠的先决条件。", author: "Dijkstra" },
                { text: "先让它工作，再让它快，再让它简单。", author: "Kent Beck" },
                { text: "最好的代码是没有代码。", author: "Jeff Atwood" },
                { text: "程序必须是为了给人看而写，给机器执行只是附带任务。", author: "Donald Knuth" }
            ];
            
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            
            if (quoteText && quoteAuthor) {
                quoteText.textContent = `"${randomQuote.text}"`;
                quoteAuthor.textContent = `— ${randomQuote.author}`;
            }
        }
        
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        
        menuToggle.addEventListener('click', function() {
            const isActive = navLinks.classList.toggle('active');
            menuToggle.classList.toggle('active');
            menuToggle.setAttribute('aria-expanded', isActive);
        });
        
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.classList.remove('active');
                menuToggle.setAttribute('aria-expanded', 'false');
            });
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && navLinks.classList.contains('active')) {
                navLinks.classList.remove('active');
                menuToggle.classList.remove('active');
                menuToggle.setAttribute('aria-expanded', 'false');
            }
        });
        
        window.addEventListener('load', function() {
            createMeteors();
            createStars();
            createParticles();
            typeEffect();
            fetchQuote();
            setInterval(fetchQuote, 30000);
        });
        
        document.addEventListener('visibilitychange', function() {
            const containers = ['meteor-container', 'star-container', 'particle-container'];
            containers.forEach(id => {
                const container = document.getElementById(id);
                if (container) {
                    container.style.animationPlayState = document.hidden ? 'paused' : 'running';
                }
            });
        });
    </script>
</body>
