        body {
            padding-top: 80px;
        }
        
        main {
            position: relative;
            z-index: 1;
        }
        
        .blog-hero {
            text-align: center;
            padding: 80px 20px 60px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--current-accent-soft);
            border: 2px solid var(--current-border);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--current-accent);
            margin-bottom: 25px;
            animation: slideDown 0.6s var(--ease-out-expo);
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .blog-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(36px, 6vw, 56px);
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--current-accent) 0%, var(--current-text) 50%, var(--current-accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite, fadeIn 0.8s var(--ease-out-expo) 0.2s both;
        }
        
        .blog-desc {
            font-size: 18px;
            color: var(--current-text-sec);
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto;
            animation: fadeIn 0.8s var(--ease-out-expo) 0.4s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .blog-filters {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 10px 22px;
            background: var(--current-card);
            border: 2px solid var(--current-border);
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            color: var(--current-text);
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
        }
        
        .filter-btn:hover {
            border-color: var(--current-accent);
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: var(--current-accent);
            border-color: var(--current-accent);
            color: #fff;
        }
        
        .search-box {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 24px;
            background: var(--current-card);
            border: 2px solid var(--current-border);
            border-radius: 30px;
            font-size: 15px;
            color: var(--current-text);
            outline: none;
            transition: all 0.3s var(--ease-smooth);
        }
        
        .search-input:focus {
            border-color: var(--current-accent);
            box-shadow: 0 0 0 3px var(--current-accent-soft);
        }
        
        .blog-grid {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }
        
        .blog-card {
            background: var(--current-card);
            border: 1px solid var(--current-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s var(--ease-smooth);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeInUp 0.6s var(--ease-out-expo) forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .blog-card:hover {
            transform: translateY(-8px);
            border-color: var(--current-accent);
            box-shadow: 0 20px 50px var(--current-glow);
        }
        
        .blog-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--current-accent-soft) 0%, var(--current-border) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        
        .blog-card-category {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 16px;
            background: var(--current-card);
            border: 1px solid var(--current-border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--current-accent);
            backdrop-filter: blur(10px);
        }
        
        .blog-card-content {
            padding: 25px;
        }
        
        .blog-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--current-text);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .blog-card-excerpt {
            font-size: 14px;
            color: var(--current-text-sec);
            line-height: 1.7;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .blog-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--current-border);
            font-size: 13px;
            color: var(--current-text-sec);
        }
        
        .blog-card-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .author-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--current-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .blog-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .tag {
            padding: 4px 12px;
            background: var(--current-accent-soft);
            border: 1px solid var(--current-border);
            border-radius: 15px;
            font-size: 12px;
            color: var(--current-accent);
        }
        
        .pagination {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .page-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--current-card);
            border: 2px solid var(--current-border);
            border-radius: 12px;
            color: var(--current-text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease-smooth);
            text-decoration: none;
        }
        
        .page-btn:hover {
            border-color: var(--current-accent);
            transform: translateY(-2px);
        }
        
        .page-btn.active {
            background: var(--current-accent);
            border-color: var(--current-accent);
            color: #fff;
        }
        
        .stats-bar {
            max-width: 1200px;
            margin: 40px auto;
            padding: 25px 30px;
            background: var(--current-card);
            border: 1px solid var(--current-border);
            border-radius: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            backdrop-filter: blur(10px);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--current-accent);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--current-text-sec);
        }
        
        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
            
            .blog-filters {
                gap: 8px;
            }
            
            .filter-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        // 渲染博客卡片
        function renderBlogPosts(posts) {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            
            posts.forEach((post, index) => {
                const card = document.createElement('article');
                card.className = 'blog-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="blog-card-image">
                        ${post.emoji}
                        <span class="blog-card-category">${post.categoryLabel}</span>
                    </div>
                    <div class="blog-card-content">
                        <h3 class="blog-card-title">${post.title}</h3>
                        <p class="blog-card-excerpt">${post.excerpt}</p>
                        <div class="blog-card-tags">
                            ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="blog-card-meta">
                            <div class="blog-card-author">
                                <div class="author-avatar">👤</div>
                                <span>${post.author}</span>
                            </div>
                            <div style="display: flex; gap: 15px;">
                                <span>👁 ${post.views}</span>
                                <span>⏱ ${post.readTime}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                card.style.cursor = 'pointer';
                card.addEventListener('click', () => {
                    window.location.href = `blog-post.html?id=${post.id}`;
                });
                
                grid.appendChild(card);
            });
        }
        
        // 分类筛选
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const category = btn.dataset.category;
                const filtered = category === 'all' 
                    ? blogPosts 
                    : blogPosts.filter(post => post.category === category);
                renderBlogPosts(filtered);
            });
        });
        
        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = blogPosts.filter(post => 
                post.title.toLowerCase().includes(query) ||
                post.excerpt.toLowerCase().includes(query) ||
                post.tags.some(tag => tag.toLowerCase().includes(query))
            );
            renderBlogPosts(filtered);
        });
        
        // 分页（演示）
        const pageBtns = document.querySelectorAll('.page-btn');
        pageBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                pageBtns.forEach(b => b.classList.remove('active'));
                if (!btn.textContent.includes('‹') && !btn.textContent.includes('›')) {
                    btn.classList.add('active');
                }
            });
        });
        
        // 初始化
        renderBlogPosts(blogPosts);
    </script>
