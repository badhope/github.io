<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面迷失了 | 熊泽城</title>
    <meta name="description" content="页面未找到 - 返回熊泽城个人网站">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1117 100%);
            --text-dark-primary: #e6f1ff;
            --text-dark-sec: #8892b0;
            --accent-dark: #64ffda;
            --accent-dark-hover: #4cdbb9;
            --glow-dark: rgba(100, 255, 218, 0.5);
            --card-dark: rgba(17, 34, 64, 0.9);
            --border-dark: rgba(100, 255, 218, 0.2);
        }
        body {
            margin: 0; font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark); color: var(--text-dark-primary);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            overflow: hidden; position: relative;
        }
        #star-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        .content-wrapper {
            position: relative; z-index: 1;
            padding: 40px 20px;
        }
        .code {
            font-family: 'Orbitron', sans-serif; font-size: clamp(100px, 15vw, 180px); font-weight: 900;
            background: linear-gradient(135deg, var(--accent-dark), #fff, var(--accent-dark));
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 30px var(--glow-dark)); margin-bottom: 20px;
            line-height: 1;
        }
        @keyframes shine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(24px, 4vw, 32px);
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--accent-dark), var(--text-dark-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: var(--text-dark-sec);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.8;
            font-size: clamp(14px, 2vw, 16px);
        }
        .btn {
            display: inline-flex; align-items: center; gap: 12px;
            padding: 16px 40px; background: transparent;
            border: 2px solid var(--accent-dark); border-radius: 50px;
            color: var(--accent-dark); text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            background: var(--accent-dark);
            color: var(--bg-dark);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--glow-dark);
        }
        .btn svg {
            transition: transform 0.3s ease;
        }
        .btn:hover svg {
            transform: translateX(-5px);
        }
        .lost-astronaut {
            font-size: clamp(60px, 10vw, 100px);
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 20px var(--glow-dark));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }
        .error-details {
            margin-top: 50px;
            padding: 20px 30px;
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }
        .error-details h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: var(--accent-dark);
            margin-bottom: 10px;
        }
        .error-details p {
            font-size: 13px;
            margin-bottom: 0;
        }
        .quick-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .quick-link {
            padding: 10px 20px;
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid var(--border-dark);
            border-radius: 20px;
            color: var(--accent-dark);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .quick-link:hover {
            background: var(--accent-dark);
            color: var(--bg-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="star-container"></div>
    
    <div class="content-wrapper">
        <div class="lost-astronaut">🧑‍🚀</div>
        <div class="code">404</div>
        <h1>页面迷失在数字宇宙中</h1>
        <p>
            抱歉，您访问的页面似乎不存在。<br>
            就像宇航员迷失在浩瀚的宇宙中，这个页面也消失在数字空间里。<br>
            但别担心，探索才刚刚开始！
        </p>
        
        <a href="index.html" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回主页
        </a>
        
        <div class="quick-links">
            <a href="resume.html" class="quick-link">📄 简历</a>
            <a href="works.html" class="quick-link">💼 作品集</a>
            <a href="contact.html" class="quick-link">📧 联系方式</a>
        </div>
        
        <div class="error-details">
            <h3>🔍 可能的原因</h3>
            <p>
                • 链接已失效或页面已迁移<br>
                • URL 输入有误<br>
                • 页面正在维护中
            </p>
        </div>
    </div>

    <script>
        // 创建星空背景
        const starContainer = document.getElementById('star-container');
        const starCount = 100;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = `${Math.random() * 3 + 1}px`;
            star.style.height = star.style.width;
            star.style.animationDelay = `${Math.random() * 3}s`;
            starContainer.appendChild(star);
        }
    </script>
</body>
</html>
